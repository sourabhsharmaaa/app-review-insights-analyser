name: Weekly Pulse Scheduler

on:
  schedule:
    # Every Monday at 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * 1'
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google Service Account JSON
        run: |
          mkdir -p ~/.groww
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > ~/.groww/service_account.json

      - name: Write Gmail Token JSON
        run: |
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > ~/.groww/gmail_token.json

      - name: Write Gmail Client Secret JSON
        run: |
          echo '${{ secrets.GMAIL_CLIENT_SECRET_JSON }}' > ~/.groww/gmail_client_secret.json

      - name: Run pipeline and publish
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_ID: com.nextbillion.groww
          WEEKS_BACK: "12"
          MAX_REVIEWS: "500"
          MIN_REVIEW_WORDS: "5"
          LOG_LEVEL: INFO
          SCRUB_MODE: regex
          FEE_FUND_URL: https://groww.in/p/exit-load-in-mutual-funds
          GDOC_DOC_ID: ${{ secrets.GDOC_DOC_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ~/.groww/service_account.json
          GMAIL_CLIENT_SECRET: ~/.groww/gmail_client_secret.json
          GMAIL_TOKEN_PATH: ~/.groww/gmail_token.json
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          USE_MCP: "false"
        run: python scheduler.py --now
